<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Type Chaos Tool</title>
<style>
:root { --accent: #e8392a; --panel: #1a1a1a; --border: #2e2e2e; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, sans-serif; background: #111; color: #f0f0f0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

#toolbar { background: #0d0d0d; border-bottom: 1px solid var(--border); padding: 7px 14px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; flex-shrink: 0; }
#toolbar h1 { font-size: 10px; letter-spacing: .2em; text-transform: uppercase; color: #555; }
.btn { background: #222; border: 1px solid #3a3a3a; border-radius: 3px; color: #bbb; font-size: 10px; letter-spacing: .08em; text-transform: uppercase; padding: 5px 9px; cursor: pointer; transition: background .1s, color .1s; }
.btn:hover { background: #2e2e2e; color: #fff; }
.btn.red { border-color: var(--accent); color: var(--accent); }
.btn.red:hover { background: var(--accent); color: #fff; }
.btn.active-mode { background: var(--accent); border-color: var(--accent); color: #fff; }
#font-load-btn { background: #1e1e1e; border: 1px dashed #555; border-radius: 3px; color: #aaa; font-size: 10px; letter-spacing: .08em; text-transform: uppercase; padding: 5px 9px; cursor: pointer; }
#font-load-btn:hover { border-color: var(--accent); color: #fff; }
#font-name { font-size: 10px; color: #666; max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.sel-info { font-size: 10px; color: #555; }
.sel-info span { color: var(--accent); }
.sep { width: 1px; height: 16px; background: #333; flex-shrink: 0; }
.toolbar-label { font-size: 9px; color: #444; letter-spacing: .1em; text-transform: uppercase; }
.rand-group { display: flex; gap: 3px; }

#stage { flex: 1; background: #e8392a; overflow: hidden; position: relative; }
#stage.dark  { background: #111; }
#stage.white { background: #fff; }

/* Il text-container vive sempre a dimensioni "native" (senza padding stage).
   Lo scaleremo con transform se necessario per il fit. */
#text-container {
  position: absolute;
  top: 0; left: 0;
  display: flex; flex-direction: column;
  padding: 30px 40px;
  transform-origin: top left;
  /* width/height vengono impostati via JS al resize */
}

.row-line { display: flex; align-items: baseline; }
.letter-wrapper { display: inline-flex; align-items: flex-end; position: relative; cursor: pointer; }
.letter-wrapper:hover { outline: 1px dashed rgba(255,255,255,.3); }
.letter-wrapper.sel { outline: 2px solid #fff; }
.letter-wrapper.brk::after { content: '↵'; position: absolute; bottom: -14px; right: 0; font-size: 9px; color: var(--accent); pointer-events: none; }
.letter-char { display: block; line-height: 1; }

#panel { background: var(--panel); border-top: 1px solid var(--border); display: grid; grid-template-columns: 200px 1fr; flex-shrink: 0; max-height: 270px; overflow: hidden; }
.p-left { border-right: 1px solid var(--border); padding: 10px 12px; display: flex; flex-direction: column; gap: 7px; overflow-y: auto; }
.p-right { padding: 10px 14px; overflow-y: auto; display: flex; flex-wrap: wrap; gap: 0 22px; align-content: flex-start; }
.p-left::-webkit-scrollbar, .p-right::-webkit-scrollbar { width: 3px; }
.p-left::-webkit-scrollbar-thumb, .p-right::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
.ph { font-size: 9px; letter-spacing: .15em; text-transform: uppercase; color: #555; border-bottom: 1px solid var(--border); padding-bottom: 3px; }
#text-input { background: #222; border: 1px solid #3a3a3a; border-radius: 3px; color: #fff; font-size: 15px; font-weight: 700; padding: 4px 7px; width: 100%; outline: none; }
#text-input:focus { border-color: var(--accent); }
#letter-list { display: flex; flex-wrap: wrap; gap: 4px; }
.lbtn { background: #252525; border: 1px solid #3a3a3a; border-radius: 3px; color: #ccc; font-size: 12px; font-weight: 700; width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
.lbtn:hover { background: #333; }
.lbtn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

.ctrl-group { min-width: 215px; display: flex; flex-direction: column; gap: 3px; margin-bottom: 6px; }
.ctrl-title { font-size: 9px; letter-spacing: .13em; text-transform: uppercase; color: #444; margin-top: 4px; margin-bottom: 1px; }
.ctrl-row { display: flex; align-items: center; gap: 7px; }
.ctrl-row label { font-size: 10px; color: #888; width: 105px; flex-shrink: 0; }
.ctrl-row input[type=range] { flex: 1; cursor: pointer; appearance: none; -webkit-appearance: none; height: 5px; border-radius: 3px; background: #e0e0e0; outline: none; }
.ctrl-row input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 24px; height: 24px; border-radius: 50%; background: #ffffff; cursor: pointer; box-shadow: 0 1px 6px rgba(0,0,0,.6); border: 3px solid #cccccc; }
.ctrl-row input[type=range]::-moz-range-thumb { width: 24px; height: 24px; border-radius: 50%; background: #ffffff; cursor: pointer; border: 3px solid #cccccc; box-shadow: 0 1px 6px rgba(0,0,0,.6); }
.ctrl-row input[type=color] { height: 21px; width: 34px; border: none; background: none; cursor: pointer; padding: 0; }
.ctrl-row .v { font-size: 10px; color: #ccc; width: 42px; text-align: right; font-variant-numeric: tabular-nums; }

.range-wrap { flex: 1; position: relative; display: flex; align-items: center; }
.range-wrap input[type=range] { width: 100%; cursor: pointer; appearance: none; -webkit-appearance: none; height: 5px; border-radius: 3px; background: #e0e0e0; outline: none; }
.range-wrap input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 24px; height: 24px; border-radius: 50%; background: #ffffff; cursor: pointer; box-shadow: 0 1px 6px rgba(0,0,0,.6); border: 3px solid #cccccc; }
.range-wrap input[type=range]::-moz-range-thumb { width: 24px; height: 24px; border-radius: 50%; background: #ffffff; cursor: pointer; border: 3px solid #cccccc; box-shadow: 0 1px 6px rgba(0,0,0,.6); }

/* Zero line condivisa — viene posizionata via JS su ogni slider */
.zero-tick { position: absolute; top: 50%; transform: translateY(-50%); width: 2px; height: 28px; background: #666; border-radius: 1px; pointer-events: none; z-index: 0; }

/* Gruppo Posizione con zero-line visiva condivisa verticale */
.pos-group { display: flex; flex-direction: column; gap: 8px; }
.pos-row { display: flex; align-items: center; gap: 7px; }
.pos-row label { font-size: 10px; color: #888; width: 105px; flex-shrink: 0; }
.pos-row .v { font-size: 10px; color: #ccc; width: 42px; text-align: right; font-variant-numeric: tabular-nums; }
.pos-sliders { flex: 1; display: flex; flex-direction: column; gap: 8px; position: relative; }
/* linea verticale dello zero comune — tracciata via pseudo-elemento su .pos-sliders */
.pos-zero-line { position: absolute; top: 0; bottom: 0; width: 2px; background: #4a4a4a; border-radius: 1px; pointer-events: none; z-index: 1; }
.pos-slider-row { position: relative; display: flex; align-items: center; }
.pos-slider-row input[type=range] { width: 100%; cursor: pointer; appearance: none; -webkit-appearance: none; height: 5px; border-radius: 3px; background: #e0e0e0; outline: none; position: relative; z-index: 2; }
.pos-slider-row input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 24px; height: 24px; border-radius: 50%; background: #ffffff; cursor: pointer; box-shadow: 0 1px 6px rgba(0,0,0,.6); border: 3px solid #cccccc; }
.pos-slider-row input[type=range]::-moz-range-thumb { width: 24px; height: 24px; border-radius: 50%; background: #ffffff; cursor: pointer; border: 3px solid #cccccc; box-shadow: 0 1px 6px rgba(0,0,0,.6); }

.break-btn { background: #252525; border: 1px solid #3a3a3a; border-radius: 3px; color: #777; font-size: 10px; letter-spacing: .05em; padding: 3px 10px; cursor: pointer; white-space: nowrap; transition: background .1s, color .1s, border-color .1s; }
.break-btn:hover { background: #333; color: #ccc; }
.break-btn.on { background: var(--accent); border-color: var(--accent); color: #fff; }

.align-btns { display: flex; gap: 3px; }
.abtn { background: #252525; border: 1px solid #3a3a3a; border-radius: 3px; color: #777; font-size: 11px; width: 24px; height: 20px; display: flex; align-items: center; justify-content: center; cursor: pointer; padding: 0; }
.abtn:hover { color: #fff; background: #333; }
.abtn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
#axes-section { min-width: 215px; display: flex; flex-direction: column; gap: 3px; margin-bottom: 6px; }
#axes-ph { font-size: 10px; color: #444; font-style: italic; }

/* Indicatore fit-to-view attivo */
#fit-badge { font-size: 9px; color: #f5a623; display: none; letter-spacing: .05em; }
#fit-badge.visible { display: inline; }
</style>
</head>
<body>

<div id="toolbar">
  <h1>Type Chaos Tool</h1>
  <label id="font-load-btn">＋ Font locale<input type="file" id="font-file" accept=".ttf,.otf,.woff,.woff2" style="display:none"></label>
  <span id="font-name">nessun font</span>
  <input type="color" id="bg-color-pick" value="#e8392a" title="Sfondo" style="height:20px;width:28px;border:1px solid #444;border-radius:3px;cursor:pointer;padding:1px 2px;background:#1a1a1a;flex-shrink:0;">
  <div class="sel-info">sel: <span id="sel-label">tutto</span></div>
  <span id="fit-badge">⬡ fit</span>
  <div class="sep"></div>
  <span class="toolbar-label">Rand</span>
  <div class="rand-group">
    <button class="btn active-mode" id="btn-gently" title="Variazioni sottili">Gently</button>
    <button class="btn" id="btn-wild" title="Massimo caos">Wild</button>
  </div>
  <button class="btn" id="btn-rand">⚡ Go</button>
  <button class="btn red" id="btn-reset">↺ Reset</button>
  <div class="sep"></div>
  <button class="btn" id="btn-export-png">↓ PNG</button>
</div>

<div id="stage">
  <div id="text-container"></div>
</div>

<div id="panel">
  <div class="p-left">
    <span class="ph">Testo</span>
    <input type="text" id="text-input" value="rimini" maxlength="40">
    <span class="ph">Lettere</span>
    <div id="letter-list"></div>
  </div>
  <div class="p-right">
    <div class="ctrl-group">
      <div class="ctrl-title">Tipografia</div>
      <div class="ctrl-row">
        <label>Dimensione (px)</label>
        <input type="range" id="c-size" min="20" max="500" value="160" step="1">
        <span class="v" id="v-size">160</span>
      </div>
      <div class="ctrl-row">
        <label>Allineamento</label>
        <div class="align-btns" id="align-btns">
          <button class="abtn active" data-align="left">⬅</button>
          <button class="abtn" data-align="center">↔</button>
          <button class="abtn" data-align="right">➡</button>
        </div>
      </div>
    </div>

    <div class="ctrl-group">
      <div class="ctrl-title">Posizione</div>
      <!-- Layout con zero-line condivisa verticalmente tra i 3 slider -->
      <div id="pos-sliders-group" style="display:flex;flex-direction:column;gap:6px;position:relative;">
        <div style="display:flex;align-items:center;gap:7px;">
          <label style="font-size:10px;color:#888;width:105px;flex-shrink:0;">Offset Y (px)</label>
          <div class="range-wrap" id="wrap-y" style="flex:1;position:relative;display:flex;align-items:center;">
            <input type="range" id="c-y" min="-300" max="300" value="0" step="1" style="width:100%;">
          </div>
          <span class="v" id="v-y" style="font-size:10px;color:#ccc;width:42px;text-align:right;font-variant-numeric:tabular-nums;">0</span>
        </div>
        <div style="display:flex;align-items:center;gap:7px;">
          <label style="font-size:10px;color:#888;width:105px;flex-shrink:0;">Spacing dx (px)</label>
          <div class="range-wrap" id="wrap-spacing" style="flex:1;position:relative;display:flex;align-items:center;">
            <input type="range" id="c-spacing" min="-80" max="100" value="0" step="1" style="width:100%;">
          </div>
          <span class="v" id="v-spacing" style="font-size:10px;color:#ccc;width:42px;text-align:right;font-variant-numeric:tabular-nums;">0</span>
        </div>
        <div style="display:flex;align-items:center;gap:7px;">
          <label style="font-size:10px;color:#888;width:105px;flex-shrink:0;">Interlinea (px)</label>
          <div class="range-wrap" id="wrap-leading" style="flex:1;position:relative;display:flex;align-items:center;">
            <input type="range" id="c-leading" min="-100" max="300" value="0" step="1" style="width:100%;">
          </div>
          <span class="v" id="v-leading" style="font-size:10px;color:#ccc;width:42px;text-align:right;font-variant-numeric:tabular-nums;">0</span>
        </div>
      </div>
      <div class="ctrl-row" style="margin-top:4px;">
        <label>A capo dopo</label>
        <button class="break-btn" id="c-break">↵ off</button>
      </div>
    </div>

    <div class="ctrl-group">
      <div class="ctrl-title">Colore</div>
      <div class="ctrl-row">
        <label>Testo</label>
        <input type="color" id="c-color" value="#111111">
        <span class="v" id="v-color">#111111</span>
      </div>
    </div>

    <div class="ctrl-group" id="axes-section">
      <div class="ctrl-title">Assi Variable Font</div>
      <span id="axes-ph">Carica un variable font.</span>
    </div>
  </div>
</div>

<script>
// ── Zero ticks ──
// Posiziona zero-tick su ogni slider e disegna linea verticale condivisa
function placeZeroTick(wrapId, min, max) {
  const wrap = document.getElementById(wrapId); if (!wrap) return;
  const tick = document.createElement('div');
  tick.className = 'zero-tick';
  tick.dataset.wrapId = wrapId;
  tick.dataset.min = min;
  tick.dataset.max = max;
  wrap.appendChild(tick);
}
placeZeroTick('wrap-y', -300, 300);
placeZeroTick('wrap-spacing', -80, 100);
placeZeroTick('wrap-leading', -100, 300);

// Allinea le zero-tick allo stesso X assoluto (la posizione dello zero di wrap-y, che è 50%)
// e disegna una linea verticale condivisa che le collega visivamente
function alignZeroTicks() {
  const thumbHalf = 11;
  const wraps = ['wrap-y','wrap-spacing','wrap-leading'];
  let sharedX = null; // X assoluto relativo al container padre comune

  wraps.forEach(id => {
    const wrap = document.getElementById(id); if (!wrap) return;
    const tick = wrap.querySelector('.zero-tick'); if (!tick) return;
    const input = wrap.querySelector('input[type=range]');
    const min = parseFloat(input.min), max = parseFloat(input.max);
    const pct = (0 - min) / (max - min);
    const wrapW = wrap.offsetWidth;
    const xPx = thumbHalf + pct * (wrapW - thumbHalf * 2);
    tick.style.left = xPx + 'px';
    tick.style.transform = 'translateX(-50%) translateY(-50%)';
    tick.style.top = '50%';
    if (sharedX === null) sharedX = xPx; // usa il primo (wrap-y al 50%) come riferimento
  });

  // Disegna la linea verticale condivisa che collega i tre zero
  let vline = document.getElementById('zero-vline');
  const posGroup = document.getElementById('pos-sliders-group');
  if (!posGroup) return;
  if (!vline) {
    vline = document.createElement('div');
    vline.id = 'zero-vline';
    vline.style.cssText = 'position:absolute;top:0;bottom:0;width:2px;background:#4a4a4a;border-radius:1px;pointer-events:none;z-index:0;';
    posGroup.style.position = 'relative';
    posGroup.appendChild(vline);
  }
  // x relativo a posGroup: posGroup left + wrap-y left + sharedX
  const wrapY = document.getElementById('wrap-y');
  if (!wrapY || sharedX === null) return;
  const groupRect = posGroup.getBoundingClientRect();
  const wrapRect  = wrapY.getBoundingClientRect();
  const xRel = (wrapRect.left - groupRect.left) + sharedX;
  vline.style.left = (xRel - 1) + 'px';
}
requestAnimationFrame(alignZeroTicks);
window.addEventListener('resize', alignZeroTicks);

// ── STATE ──
const DEF = () => ({ size:160, y:0, spacing:0, color:'#111111', breakAfter:false, align:'left', axes:{} });
let letters=[], selIdx=null, curFont=null, fontBlobURL=null, axesList=[], leading=0, randMode='gently';

// currentScale tiene traccia dello scale fit-to-view applicato al text-container
let currentScale = 1;

// ── FONT ──
document.getElementById('font-file').addEventListener('change', async e => {
  const file = e.target.files[0]; if (!file) return;
  const nm = document.getElementById('font-name');
  nm.textContent = '…'; nm.style.color = '#666';
  try {
    if (fontBlobURL) URL.revokeObjectURL(fontBlobURL);
    fontBlobURL = URL.createObjectURL(file);
    const name = 'UF_' + Date.now();
    const face = new FontFace(name, `url(${fontBlobURL})`);
    await face.load();
    document.fonts.add(face);
    injectFF(name, fontBlobURL);
    curFont = name;
    nm.style.color = '#5dba6a';
    nm.textContent = '✓ ' + file.name.replace(/\.[^.]+$/, '');
    const buf = await file.arrayBuffer();
    axesList = parseAxes(buf);
    buildAxesUI();
    const axd = {}; axesList.forEach(a => axd[a.tag] = a.default);
    letters.forEach(d => d.axes = { ...axd, ...d.axes });
    render(); syncPanel();
  } catch(err) { nm.style.color='#e8392a'; nm.textContent='⚠ errore'; console.error(err); }
});

function injectFF(name, url) {
  const old = document.getElementById('_ff'); if (old) old.remove();
  const s = document.createElement('style');
  s.id = '_ff';
  s.textContent = `@font-face { font-family: '${name}'; src: url('${url}'); font-weight: 1 999; }`;
  document.head.appendChild(s);
}

function parseAxes(buf) {
  try {
    const v = new DataView(buf); const nT = v.getUint16(4); let off = null;
    for (let i=0; i<nT; i++) { const o=12+i*16; const t=String.fromCharCode(v.getUint8(o),v.getUint8(o+1),v.getUint8(o+2),v.getUint8(o+3)); if(t==='fvar'){off=v.getUint32(o+8);break;} }
    if (!off) return [];
    const axOff=v.getUint16(off+4), nAx=v.getUint16(off+8), axSz=v.getUint16(off+10);
    const NM={wght:'Weight',wdth:'Width',ital:'Italic',slnt:'Slant',opsz:'Optical Size',GRAD:'Grade'};
    const r=[];
    for (let i=0; i<nAx; i++) { const b=off+axOff+i*axSz; const tag=String.fromCharCode(v.getUint8(b),v.getUint8(b+1),v.getUint8(b+2),v.getUint8(b+3)); r.push({tag, name:NM[tag]||tag, min:Math.round(v.getInt32(b+4)/65536), default:Math.round(v.getInt32(b+8)/65536), max:Math.round(v.getInt32(b+12)/65536)}); }
    return r;
  } catch(e) { return []; }
}

function buildAxesUI() {
  const sec = document.getElementById('axes-section');
  sec.querySelectorAll('.ax-row').forEach(el => el.remove());
  document.getElementById('axes-ph').style.display = axesList.length ? 'none' : '';
  axesList.forEach(ax => {
    const row = document.createElement('div');
    row.className = 'ctrl-row ax-row';
    row.innerHTML = `<label>${ax.name}</label><input type="range" id="c-ax-${ax.tag}" min="${ax.min}" max="${ax.max}" value="${ax.default}" step="1"><span class="v" id="v-ax-${ax.tag}">${ax.default}</span>`;
    row.querySelector('input').addEventListener('input', function() {
      const int = Math.round(+this.value);
      document.getElementById('v-ax-'+ax.tag).textContent = int;
      applyTo(d => { d.axes=d.axes||{}; d.axes[ax.tag]=int; });
      render();
    });
    sec.appendChild(row);
  });
}

// ── RENDER ──
const tc   = document.getElementById('text-container');
const stage = document.getElementById('stage');
const FF  = () => curFont ? `'${curFont}'` : 'Arial Black, Impact, sans-serif';
const FVS = d => { if (!curFont||!d.axes) return ''; return Object.entries(d.axes).map(([k,v])=>`'${k}' ${v}`).join(', '); };

function render() {
  tc.innerHTML = '';
  // Resetta scale prima di misurare
  tc.style.transform = 'none';
  tc.style.width = '';
  tc.style.height = '';

  const rows=[]; let cur=[];
  letters.forEach((d,i)=>{ cur.push({d,i}); if(d.breakAfter){rows.push(cur);cur=[];} });
  if(cur.length) rows.push(cur);

  rows.forEach(row=>{
    const jm={left:'flex-start',center:'center',right:'flex-end'};
    const div=document.createElement('div');
    div.className='row-line';
    div.style.justifyContent=jm[row[0]?.d.align]||'flex-start';
    div.style.marginBottom=leading+'px';
    row.forEach(({d,i})=>{
      const w=document.createElement('div');
      w.className='letter-wrapper'+(selIdx===i?' sel':'')+(d.breakAfter?' brk':'');
      w.style.marginRight=d.spacing+'px';
      w.style.transform=`translateY(${d.y}px)`;
      w.dataset.i=i;
      const s=document.createElement('span');
      s.className='letter-char';
      s.textContent=d.char===' '?'\u00A0':d.char;
      s.style.fontSize=d.size+'px';
      s.style.fontFamily=FF();
      s.style.color=d.color;
      const fv=FVS(d); if(fv) s.style.fontVariationSettings=fv;
      w.appendChild(s);
      w.addEventListener('click',()=>selectLetter(i));
      div.appendChild(w);
    });
    tc.appendChild(div);
  });

  // Applica fit-to-view dopo il layout
  requestAnimationFrame(applyFit);
}

// ── FIT TO VIEW ──
// Se il text-container è più grande dello stage, scala per farlo stare.
// L'export rimuove la scala e cattura le dimensioni native.
function applyFit() {
  const stageW = stage.offsetWidth;
  const stageH = stage.offsetHeight;

  // Misura il contenuto a scala 1:1
  tc.style.transform = 'none';
  tc.style.width = '';
  tc.style.height = '';

  const tcW = tc.scrollWidth;
  const tcH = tc.scrollHeight;

  const scaleX = stageW / tcW;
  const scaleY = stageH / tcH;
  const scale  = Math.min(1, scaleX, scaleY); // mai ingrandire oltre 1

  currentScale = scale;

  if (scale < 1) {
    // Centra il contenuto scalato dentro lo stage
    tc.style.transform = `scale(${scale})`;
    tc.style.transformOrigin = 'top left';
    tc.style.left = Math.round((stageW - tcW * scale) / 2) + 'px';
    tc.style.top  = Math.round((stageH - tcH * scale) / 2) + 'px';
    document.getElementById('fit-badge').classList.add('visible');
  } else {
    // Contenuto entra: centralo senza scala
    tc.style.transform = 'none';
    tc.style.left = Math.round((stageW - tcW) / 2) + 'px';
    tc.style.top  = Math.round((stageH - tcH) / 2) + 'px';
    document.getElementById('fit-badge').classList.remove('visible');
  }
}

// ── LETTER LIST ──
function buildLetterList() {
  const el=document.getElementById('letter-list'); el.innerHTML='';
  const all=document.createElement('div');
  all.className='lbtn'+(selIdx===null?' active':'');
  all.textContent='✦';
  all.onclick=()=>{ selIdx=null; updLabel(); syncPanel(); buildLetterList(); render(); };
  el.appendChild(all);
  letters.forEach((d,i)=>{ const b=document.createElement('div'); b.className='lbtn'+(selIdx===i?' active':''); b.textContent=d.char===' '?'␣':d.char; b.onclick=()=>selectLetter(i); el.appendChild(b); });
}

function selectLetter(i) { selIdx=i; updLabel(); syncPanel(); buildLetterList(); render(); }
function updLabel() { document.getElementById('sel-label').textContent = selIdx!==null?(letters[selIdx].char===' '?'␣':`"${letters[selIdx].char}" [${selIdx+1}]`):'tutto'; }

// ── PANEL SYNC ──
function syncPanel() {
  const s=selIdx!==null?letters[selIdx]:(letters[0]||DEF());
  sv('size',s.size); sv('y',s.y); sv('spacing',s.spacing); sv('leading',leading); sc('color',s.color);
  const isOn=selIdx!==null?!!letters[selIdx].breakAfter:false;
  const brk=document.getElementById('c-break'); brk.textContent=isOn?'↵ on':'↵ off'; brk.classList.toggle('on',isOn);
  const al=s.align||'left'; document.querySelectorAll('.abtn').forEach(b=>b.classList.toggle('active',b.dataset.align===al));
  axesList.forEach(ax=>{ const si=document.getElementById('c-ax-'+ax.tag),vi=document.getElementById('v-ax-'+ax.tag); if(!si)return; const val=s.axes?.[ax.tag]??ax.default; si.value=val; vi.textContent=Math.round(val); });
}

function sv(id,val) { const s=document.getElementById('c-'+id),v=document.getElementById('v-'+id); if(s)s.value=val; if(v)v.textContent=Math.round(val); }
function sc(id,val) { const i=document.getElementById('c-'+id),v=document.getElementById('v-'+id); if(i)i.value=val; if(v)v.textContent=val; }

// ── CONTROLS ──
function applyTo(fn) { if(selIdx!==null)fn(letters[selIdx]);else letters.forEach(fn); }

function bindR(id,prop) {
  const s=document.getElementById('c-'+id),v=document.getElementById('v-'+id); if(!s)return;
  s.addEventListener('input',()=>{ const int=Math.round(+s.value); v.textContent=int; applyTo(d=>d[prop]=int); render(); });
}
function bindC(id,prop) {
  const i=document.getElementById('c-'+id),v=document.getElementById('v-'+id); if(!i)return;
  i.addEventListener('input',()=>{ v.textContent=i.value; applyTo(d=>d[prop]=i.value); render(); });
}

bindR('size','size'); bindR('y','y'); bindR('spacing','spacing'); bindC('color','color');

document.getElementById('c-leading').addEventListener('input',function(){ leading=Math.round(+this.value); document.getElementById('v-leading').textContent=leading; render(); });
document.getElementById('c-break').addEventListener('click',function(){ if(selIdx===null)return; letters[selIdx].breakAfter=!letters[selIdx].breakAfter; this.textContent=letters[selIdx].breakAfter?'↵ on':'↵ off'; this.classList.toggle('on',letters[selIdx].breakAfter); render(); });
document.getElementById('align-btns').addEventListener('click',e=>{ const b=e.target.closest('.abtn'); if(!b)return; const al=b.dataset.align; applyTo(d=>d.align=al); document.querySelectorAll('.abtn').forEach(x=>x.classList.toggle('active',x.dataset.align===al)); render(); });
document.getElementById('text-input').addEventListener('input',e=>initText(e.target.value||' '));
document.getElementById('bg-color-pick').addEventListener('input',function(){ stage.style.background=this.value; stage.className=''; });

// ── RANDOMIZE ──
function rnd(a,b){return Math.random()*(b-a)+a;}
function rndInt(a,b){return Math.round(rnd(a,b));}

['gently','wild'].forEach(mode=>{ document.getElementById('btn-'+mode).addEventListener('click',()=>{ randMode=mode; document.querySelectorAll('#btn-gently,#btn-wild').forEach(b=>b.classList.remove('active-mode')); document.getElementById('btn-'+mode).classList.add('active-mode'); }); });

document.getElementById('btn-rand').addEventListener('click',()=>{
  const n=letters.length;
  letters.forEach((d,i)=>{
    if(randMode==='gently'){ d.size=rndInt(120,200);d.y=rndInt(-20,20);d.spacing=rndInt(-5,20); axesList.forEach(ax=>{const range=(ax.max-ax.min)*0.25;d.axes=d.axes||{};d.axes[ax.tag]=Math.round(Math.min(ax.max,Math.max(ax.min,ax.default+(Math.random()-.5)*range)));});}
    else if(randMode==='wild'){ d.size=rndInt(30,380);d.y=rndInt(-250,250);d.spacing=rndInt(-80,100); axesList.forEach(ax=>{d.axes=d.axes||{};d.axes[ax.tag]=rndInt(ax.min,ax.max);});}
  });
  syncPanel(); render();
});

document.getElementById('btn-reset').addEventListener('click',()=>{ const axd={}; axesList.forEach(ax=>axd[ax.tag]=ax.default); letters.forEach(d=>{const c=d.char;Object.assign(d,DEF(),{char:c,axes:{...axd}});}); leading=0;sv('leading',0);syncPanel();render(); });

// ── INIT TEXT ──
function initText(t) {
  const prev=[...letters];
  letters=[...t].map((c,i)=>{const p=prev[i];return p?{...p,char:c}:{...DEF(),char:c};});
  selIdx=null; render(); buildLetterList(); syncPanel(); updLabel();
}

// ── EXPORT — apre finestra pulita per screenshot ──
document.getElementById('btn-export-png').addEventListener('click', () => {
  const prevSel=selIdx; selIdx=null; render();
  requestAnimationFrame(()=>{ requestAnimationFrame(()=>{
    const bgColor = document.getElementById('bg-color-pick').value || '#e8392a';
    const clone = tc.cloneNode(true);
    clone.querySelectorAll('.letter-wrapper').forEach(el=>{ el.style.outline='none'; el.classList.remove('sel'); });
    clone.querySelectorAll('.brk').forEach(el=>el.classList.remove('brk'));
    // Leggi la posizione e scala REALE del tc nello stage (calcolata da applyFit)
    const tcLeft      = tc.style.left  || '0px';
    const tcTop       = tc.style.top   || '0px';
    const tcTransform = tc.style.transform || 'none';
    const tcOrigin    = tc.style.transformOrigin || 'top left';
    const ffStyle = document.getElementById('_ff')?.outerHTML || '';
    const W = stage.offsetWidth;
    const H = stage.offsetHeight;
    const win = window.open('','_blank','width='+(W+40)+',height='+(H+80)+',menubar=no,toolbar=no,location=no,scrollbars=no');
    if(!win){ alert('Popup bloccato. Consenti i popup per questo file.'); selIdx=prevSel; render(); return; }
    win.document.write('<!DOCTYPE html><html><head><meta charset="UTF-8">'+ffStyle
      +'<style>*{margin:0;padding:0;box-sizing:border-box;}html,body{background:#222;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:14px;padding:20px;}'
      +'.stage{width:'+W+'px;height:'+H+'px;background:'+bgColor+';position:relative;overflow:hidden;flex-shrink:0;}'
      // tc: position assoluta identica a quella nello stage originale
      +'#tc{position:absolute;left:'+tcLeft+';top:'+tcTop+';transform:'+tcTransform+';transform-origin:'+tcOrigin+';display:flex;flex-direction:column;padding:30px 40px;}'
      +'.row-line{display:flex;align-items:baseline;}'
      +'.letter-wrapper{display:inline-flex;align-items:flex-end;position:relative;}'
      +'.letter-char{display:block;line-height:1;}'
      +'.hint{background:rgba(255,255,255,.07);color:#888;font-family:system-ui;font-size:11px;padding:7px 16px;border-radius:6px;text-align:center;line-height:1.7;}'
      +'@media print{html,body{background:transparent!important;display:block!important;padding:0!important;gap:0!important;}.stage{margin:0!important;}.hint{display:none!important;}@page{size:'+W+'px '+H+'px;margin:0;}body{-webkit-print-color-adjust:exact;print-color-adjust:exact;}}'
      +'</style></head><body>'
      +'<div class="stage"><div id="tc">'+clone.innerHTML+'</div></div>'
      +'<div class="hint">📷 Screenshot &nbsp;·&nbsp; Mac: <b>Cmd+Shift+4</b> &nbsp;·&nbsp; Win: <b>Win+Shift+S</b><br>📄 PDF vettoriale &nbsp;·&nbsp; <b>Cmd+P</b> / <b>Ctrl+P</b> → Salva come PDF</div>'
      +'</body></html>');
    win.document.close();
    selIdx=prevSel; render();
  });});
});

new ResizeObserver(()=>{ requestAnimationFrame(applyFit); }).observe(stage);
initText('rimini');
</script>
</body>
</html>
